<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daksh's AI Agent - V4 (Smart Mode)</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; font-size: 24px; text-align: center; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 5px; box-sizing: border-box;}
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .settings { background: #0d1117; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #30363d;}
        #status { font-size: 14px; text-align: center; color: #8b949e; margin-top: 10px; word-wrap: break-word; line-height: 1.5;}
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AI Site Builder (V4)</h1>
    <div class="settings">
        <p style="margin-top:0; font-size: 12px; color: #8b949e;">🔑 Enter keys and tap Save:</p>
        <input type="password" id="geminiInput" placeholder="Gemini API Key">
        <input type="password" id="ghInput" placeholder="GitHub Token">
        <button style="background: #1f6feb; padding: 10px;" onclick="saveKeys()">Save Keys Locally</button>
    </div>
    <textarea id="prompt" placeholder="Tell the AI what to build..."></textarea>
    <button onclick="runAgent()">GENERATE & DEPLOY</button>
    <div id="status">System Standby...</div>
</div>

<script>
    window.onload = function() {
        if(localStorage.getItem("geminiKey")) document.getElementById('geminiInput').value = localStorage.getItem("geminiKey");
        if(localStorage.getItem("ghToken")) document.getElementById('ghInput').value = localStorage.getItem("ghToken");
    }

    function saveKeys() {
        localStorage.setItem("geminiKey", document.getElementById('geminiInput').value.trim());
        localStorage.setItem("ghToken", document.getElementById('ghInput').value.trim());
        alert("Keys saved to your phone!");
    }

    async function runAgent() {
        const prompt = document.getElementById('prompt').value;
        const status = document.getElementById('status');
        const GEMINI_KEY = localStorage.getItem("geminiKey");
        const GH_TOKEN = localStorage.getItem("ghToken");
        const REPO_OWNER = "dal098073-cpu"; 
        const REPO_NAME = "Ai-agent";       

        if(!prompt || !GEMINI_KEY || !GH_TOKEN) return alert("Enter prompt and save keys!");

        status.innerText = "🔍 Checking which Brain (Model) to use...";

        try {
            // STEP 1: AUTO-DETECT THE BEST MODEL
            const listResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_KEY}`);
            const listData = await listResponse.json();
            
            if (listData.error) throw new Error("API Key Error: " + listData.error.message);

            // Find the first model that supports generating content
            const bestModel = listData.models.find(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("flash"));
            const modelName = bestModel ? bestModel.name : "models/gemini-1.5-flash"; // Fallback

            status.innerText = "🧠 Using: " + modelName + "... Thinking...";

            // STEP 2: GENERATE THE CODE
            const aiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: "Write the full HTML code for a single webpage based on: " + prompt + ". Only output the raw HTML code, no markdown." }] }] 
                })
            });
            
            const data = await aiResponse.json();
            if (data.error) throw new Error("Gemini Error: " + data.error.message);
            
            let newCode = data.candidates[0].content.parts[0].text;
            newCode = newCode.replace(/```html|```/gi, "").trim();

            status.innerText = "💾 Pushing to GitHub...";

            // STEP 3: PUSH TO GITHUB
            const getFile = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`, {
                headers: { "Authorization": `token ${GH_TOKEN}` }
            });
            const fileData = await getFile.json();

            const updateFile = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`, {
                method: "PUT",
                headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "AI Update",
                    content: btoa(unescape(encodeURIComponent(newCode))),
                    sha: fileData.sha
                })
            });

            if(updateFile.ok) {
                status.innerText = "✅ SUCCESS! Refresh your main link in 30 seconds.";
            } else {
                throw new Error("GitHub Push Failed.");
            }
        } catch (e) {
            status.innerText = "❌ " + e.message;
        }
    }
</script>
</body>
</html>
