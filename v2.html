<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daksh's Firebase Builder - V7</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;}
        .container { width: 100%; max-width: 600px; background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #ffca28; font-size: 26px; text-align: center; margin-bottom: 5px;}
        p.subtitle { text-align: center; color: #8b949e; font-size: 14px; margin-bottom: 20px; }
        label { font-size: 14px; font-weight: bold; color: #ffca28; margin-bottom: 5px; display: block; margin-top: 15px;}
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 5px; box-sizing: border-box; font-size: 14px;}
        textarea { height: 80px; resize: vertical; }
        button { width: 100%; padding: 15px; background: #f57c00; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.2s;}
        button:hover { background: #ef6c00; }
        .settings { background: #010409; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d;}
        #status { font-size: 15px; text-align: center; color: #e6edf3; margin-top: 15px; word-wrap: break-word; line-height: 1.5; padding: 15px; border-radius: 5px; background: #21262d; display: none;}
        .link-box { margin-top: 15px; padding: 15px; background: #2ea043; color: white; border-radius: 8px; text-align: center; display: none; }
        .link-box a { color: #fff; font-weight: bold; text-decoration: underline; display: block; margin-top: 5px; word-break: break-all;}
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 Firebase AI Builder</h1>
    <p class="subtitle">Generates Cloud-Connected Web Apps</p>

    <div class="settings">
        <p style="margin-top:0; font-size: 12px; color: #8b949e;">🔑 Core API Keys</p>
        <input type="password" id="geminiInput" placeholder="Gemini API Key">
        <input type="password" id="ghInput" placeholder="GitHub Token">
        <button style="background: #2ea043; padding: 10px; font-size: 14px;" onclick="saveKeys()">Save Core Keys</button>
    </div>

    <label>🔥 Firebase Config Object (Pre-filled for Daksh)</label>
    <textarea id="firebaseConfig" style="height: 150px; font-family: monospace;">
const firebaseConfig = {
  apiKey: "AIzaSyASm3_DewrSoTXaNE_GoG9LxoSI15q0EY8",
  authDomain: "auto-35527.firebaseapp.com",
  projectId: "auto-35527",
  storageBucket: "auto-35527.firebasestorage.app",
  messagingSenderId: "82228269253",
  appId: "1:82228269253:web:0bd872188d135462aae0ac"
};
    </textarea>

    <label>📁 Project Name (e.g., 'global-gym')</label>
    <input type="text" id="filename" placeholder="Creates global-gym.html and global-gym-admin.html">

    <label>📱 1. User Interface Prompt</label>
    <textarea id="uiPrompt" placeholder="Describe the UI..."></textarea>

    <label>⚙️ 2. Admin Panel Prompt</label>
    <textarea id="adminPrompt" placeholder="Describe the Admin Panel..."></textarea>
    
    <button onclick="runFirebaseAgent()">🚀 DEPLOY FIREBASE APP</button>
    
    <div id="status">System Standby...</div>
    
    <div id="success-link" class="link-box">
        ✅ <strong>Cloud Sites Deployed! Wait 45s, then test:</strong><br><br>
        <a id="admin-url" href="#" target="_blank">Admin Link</a><br>
        <a id="ui-url" href="#" target="_blank">UI Link</a>
    </div>
</div>

<script>
    window.onload = function() {
        if(localStorage.getItem("geminiKey")) document.getElementById('geminiInput').value = localStorage.getItem("geminiKey");
        if(localStorage.getItem("ghToken")) document.getElementById('ghInput').value = localStorage.getItem("ghToken");
    }

    function saveKeys() {
        localStorage.setItem("geminiKey", document.getElementById('geminiInput').value.trim());
        localStorage.setItem("ghToken", document.getElementById('ghInput').value.trim());
        alert("Keys saved!");
    }

    async function pushToGitHub(token, owner, repo, path, content, message) {
        let fileSha = null;
        const checkFile = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, { headers: { "Authorization": `token ${token}` } });
        if (checkFile.ok) { fileSha = (await checkFile.json()).sha; }
        const pushBody = { message: message, content: btoa(unescape(encodeURIComponent(content))) };
        if (fileSha) pushBody.sha = fileSha;
        const updateFile = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
            method: "PUT", headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(pushBody)
        });
        if(!updateFile.ok) throw new Error("GitHub rejected upload. Check token.");
        return true;
    }

    async function getCodeFromAI(apiKey, prompt, model) {
        const aiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${apiKey}`, {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await aiResponse.json();
        if (data.error) throw new Error("AI Error: " + data.error.message);
        return data.candidates[0].content.parts[0].text.replace(/```html|```/gi, "").trim();
    }

    async function runFirebaseAgent() {
        let baseName = document.getElementById('filename').value.trim().replace(/\s+/g, '-').toLowerCase();
        const uiText = document.getElementById('uiPrompt').value;
        const adminText = document.getElementById('adminPrompt').value;
        const fbConfig = document.getElementById('firebaseConfig').value.trim();
        const status = document.getElementById('status');
        const successBox = document.getElementById('success-link');
        
        const GEMINI_KEY = document.getElementById('geminiInput').value.trim();
        const GH_TOKEN = document.getElementById('ghInput').value.trim();
        const REPO_OWNER = "dal098073-cpu"; 
        const REPO_NAME = "Ai-agent";       

        if(!baseName || !uiText || !adminText || !GEMINI_KEY || !GH_TOKEN || !fbConfig) return alert("Fill all fields!");

        if (baseName.endsWith('.html')) baseName = baseName.slice(0, -5);
        const uiFile = baseName + ".html";
        const adminFile = baseName + "-admin.html";

        successBox.style.display = "none";
        status.style.display = "block";
        status.style.background = "#21262d";

        try {
            status.innerText = `🔍 Booting Engine...`;
            const listData = await (await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_KEY}`)).json();
            const bestModel = listData.models.find(m => m.supportedGenerationMethods.includes("generateContent") && m.name.includes("flash"));
            const modelName = bestModel ? bestModel.name : "models/gemini-1.5-flash";

            const firebaseRules = `
            CRITICAL FIREBASE INSTRUCTIONS:
            1. You MUST include these EXACT scripts in the <head>:
               <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"><\/script>
               <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"><\/script>
            2. Initialize Firebase using this config: ${fbConfig}
            3. Use 'firebase.firestore()' to access the database. Save/Read data to a collection called '${baseName}_data' and document 'main'.
            4. Make the UI stunning and detailed. Output ONLY raw HTML.`;

            // --- PASS 1: ADMIN PANEL WITH FIREBASE ---
            status.innerText = `🧠 Writing Admin Panel...`;
            const adminCode = await getCodeFromAI(GEMINI_KEY, `Write HTML/CSS/JS for this Admin Panel: "${adminText}". ${firebaseRules}`, modelName);

            status.innerText = `💾 Uploading Admin...`;
            await pushToGitHub(GH_TOKEN, REPO_OWNER, REPO_NAME, adminFile, adminCode, "Admin for " + baseName);

            // --- PASS 2: UI WITH FIREBASE ---
            status.innerText = `🧠 Writing Public UI...`;
            const uiCode = await getCodeFromAI(GEMINI_KEY, `Write HTML/CSS/JS for this Public UI: "${uiText}". It must read real-time data using 'onSnapshot'. ${firebaseRules}`, modelName);

            status.innerText = `💾 Uploading UI...`;
            await pushToGitHub(GH_TOKEN, REPO_OWNER, REPO_NAME, uiFile, uiCode, "UI for " + baseName);

            status.innerText = "🔥 CLOUD APPS DEPLOYED!";
            status.style.background = "#f57c00";
            
            document.getElementById('admin-url').href = `https://${REPO_OWNER}.github.io/${REPO_NAME}/${adminFile}`;
            document.getElementById('admin-url').innerText = `Admin: .../${adminFile}`;
            document.getElementById('ui-url').href = `https://${REPO_OWNER}.github.io/${REPO_NAME}/${uiFile}`;
            document.getElementById('ui-url').innerText = `UI: .../${uiFile}`;
            successBox.style.display = "block";

        } catch (e) {
            status.innerText = "❌ " + e.message;
            status.style.background = "#da3633";
        }
    }
</script>
</body>
</html>
