<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gtg - Gotta Go!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #e0f2f7; /* Light blue background */
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            padding: 50px 70px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 90%;
            border: 1px solid #c0e0e8;
        }
        h1 {
            color: #007bff; /* Blue heading */
            margin-bottom: 25px;
            font-size: 3.5em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        p {
            font-size: 1.3em;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .action-button {
            display: inline-block;
            background-color: #28a745; /* Green button */
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
        }
        .action-button:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }
        .action-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gtg!</h1>
        <p>It's been a fun ride, but all good things must come to an end.</p>
        <p>Time to pack up and head out for new adventures. See you around!</p>
        <button class="action-button" onclick="alert('Farewell! Hope to see you again soon!');">Acknowledge Departure</button>
    </div>
    <footer>
        <p>&copy; 2023 Gtg Adventures. All rights reserved.</p>
    </footer>
</body>
</html>
